name: Update Docker Agent version

on:
  repository_dispatch:
    types: [docker-agent-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Docker Agent version (e.g., v1.28.1). Leave empty to use latest release."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout for composite actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: docker/cagent-action
          ref: ${{ github.workflow_sha }}

      - name: Setup credentials
        uses: ./.github/actions/setup-credentials

      - name: Checkout with token
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ env.GITHUB_APP_TOKEN }}

      - name: Determine version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ env.GITHUB_APP_TOKEN }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "Using manual input version: $VERSION"
          elif [ -n "$DISPATCH_VERSION" ]; then
            VERSION="$DISPATCH_VERSION"
            echo "Using dispatched version: $VERSION"
          else
            VERSION=$(gh release view --repo docker/docker-agent --json tagName --jq .tagName)
            echo "Using latest release: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in action.yml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Remove 'v' prefix if present
          VERSION_NO_V="${VERSION#v}"
          
          # Update the default version in action.yml
          sed -i "s/default: \"v[0-9.]*\"/default: \"$VERSION\"/" action.yml
          
          echo "Updated action.yml to version $VERSION"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.GITHUB_APP_TOKEN }}
          commit-message: "chore: update docker-agent to ${{ steps.version.outputs.version }}"
          title: "chore: update docker-agent to ${{ steps.version.outputs.version }}"
          body: |
            Automated update of docker-agent version to ${{ steps.version.outputs.version }}
            
            Release notes: https://github.com/docker/docker-agent/releases/tag/${{ steps.version.outputs.version }}
          branch: update-docker-agent-${{ steps.version.outputs.version }}
          delete-branch: true
